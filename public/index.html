<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <title>Relacion.at!</title>
    <script>if(location.hostname.includes('outpl'))document.title='Outplai';</script>
    <style id="expo-reset">
      html, body {
        height: 100%;
        margin: 0;
        background: #FFFFFF;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Compact Text', 'Segoe UI', sans-serif;
      }
      body { overflow: hidden; }
      #root {
        display: flex;
        height: 100%;
        min-height: 100vh;
        flex: 1;
        background: #FFFFFF;
      }
      /* Fallback until React mounts */
      #root .load-fallback {
        display: flex;
        flex: 1;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        color: #4A3F6B;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Compact Text', 'Segoe UI', sans-serif;
      }
      #root .load-fallback .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E2E8F0;
        border-top-color: #FF6B00;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="load-fallback" aria-hidden="true">
        <div class="spinner"></div>
        <span id="app-name">Relacion.at!</span>
        <script>if(location.hostname.includes('outpl'))document.getElementById('app-name').textContent='Outplai';</script>
      </div>
    </div>
  </body>
</html>
